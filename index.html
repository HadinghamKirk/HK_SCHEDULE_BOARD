<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#222;padding:1rem}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.toolbar h2{font-size:16px;font-weight:500;flex:1}
.sync-status{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.sync-ok{background:#e8f5e9;color:#2e7d32}
.sync-saving{background:#fff3e0;color:#e65100}
.sync-err{background:#ffebee;color:#c62828}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;border:1px solid #ccc;background:#fff;font-size:12px;cursor:pointer}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#1565C0;color:#fff;border-color:#1565C0}
.btn.primary:hover{background:#0D47A1}
.btn.sm{padding:3px 8px;font-size:11px}
.two-col{display:grid;grid-template-columns:200px 1fr;gap:12px;align-items:start}
.key-panel{border:1px solid #ddd;border-radius:8px;background:#fff;position:sticky;top:10px;max-height:95vh;overflow-y:auto}
.key-header{padding:8px 10px;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #eee;background:#f9f9f9;position:sticky;top:0;z-index:5}
.key-team{border-bottom:1px solid #eee}
.key-team-hdr{display:flex;align-items:center;gap:6px;padding:7px 10px}
.key-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid rgba(0,0,0,.15)}
.colour-picker-wrap{display:none;padding:6px 10px 8px 27px;flex-wrap:wrap;gap:5px}
.colour-picker-wrap.open{display:flex}
.colour-swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.colour-swatch:hover{border-color:#333}
.colour-swatch.selected{border-color:#000}
.key-team-name-input{font-size:12px;font-weight:600;flex:1;border:none;background:transparent;outline:none;color:#222;min-width:0}
.key-team-name-input:focus{background:#f0f0f0;border-radius:3px;padding:0 3px}
.del-team{background:none;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:0 2px;line-height:1}
.del-team:hover{color:#c62828}
.key-members{padding:0 10px 6px 27px;display:flex;flex-direction:column;gap:2px}
.key-member{display:flex;align-items:center;gap:3px}
.key-member input{font-size:11px;border:none;background:transparent;width:100%;padding:1px 3px;border-radius:3px;outline:none;color:#333}
.key-member input:focus{background:#f0f0f0}
.del-member{background:none;border:none;cursor:pointer;color:#bbb;font-size:12px;padding:0 2px;line-height:1;flex-shrink:0}
.del-member:hover{color:#c62828}
.key-add{padding:2px 10px 7px 27px}
.key-add input{font-size:11px;border:1px solid #ddd;border-radius:3px;padding:2px 6px;background:#fff;width:100%;outline:none}
.key-add input:focus{border-color:#1565C0}
.key-section-label{padding:6px 10px 2px;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;border-top:2px solid #eee;background:#fafafa}
.key-add-team{padding:8px 10px;border-top:1px solid #eee}
.key-add-team-row{display:flex;gap:6px;align-items:center}
.key-add-team-row input[type=text]{font-size:11px;border:1px solid #ddd;border-radius:4px;padding:4px 7px;flex:1;outline:none}
.key-add-team-row input[type=color]{width:28px;height:28px;border:1px solid #ddd;border-radius:4px;cursor:pointer;padding:2px}
.key-legend{padding:8px 10px;border-top:1px solid #eee;background:#f9f9f9}
.key-legend-title{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;margin-bottom:5px}
.key-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;margin-bottom:3px}
.key-leg-swatch{width:24px;height:10px;border-radius:2px;flex-shrink:0}
.hint{font-size:10px;color:#aaa;margin-top:4px}
.gantt-wrap{overflow-x:auto;border:1px solid #ddd;border-radius:8px;background:#fff}
.gantt-inner{width:100%}
.month-section{border-bottom:2px solid #ddd}
.month-section:last-child{border-bottom:none}
.month-header{display:grid;align-items:center;background:#f9f9f9;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:10}
.month-label{padding:5px 8px;font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em;border-right:1px solid #eee}
.day-cell{text-align:center;font-size:8px;color:#aaa;padding:3px 0;border-right:1px solid #eee;line-height:1.3}
.day-cell.we{background:#a0a0a0;color:#fff}
.day-cell.bh{background:#7e57c2;color:#fff;font-weight:600}
.day-cell.tod{background:#E65100;color:#fff;font-weight:600}
.board-row{display:grid;align-items:stretch;border-bottom:1px solid #eee}
.board-row:last-child{border-bottom:none}
.row-label{padding:0 8px;font-size:11px;font-weight:600;display:flex;align-items:center;border-right:1px solid #ddd;white-space:nowrap}
.row-label.abs-lbl{color:#aaa;font-size:10px;font-weight:400;font-style:italic;background:#fafafa}
.days-area{position:relative;display:grid;overflow:visible}
.day-bg{border-right:1px solid #eee}
.day-bg.we{background:#d0d0d0}
.day-bg.bh{background:#ede7f6}
.day-bg.tod{background:#fff3e0}
.day-bg.abs-bg{background:#fafafa}
.bar{position:absolute;top:3px;bottom:3px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;user-select:none;overflow:hidden;white-space:nowrap;transition:filter .15s}
.plant-marker{position:absolute;top:-12px;font-size:15px;pointer-events:none;z-index:5;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.bar:hover{filter:brightness(.9)}
.bar .rh{position:absolute;top:0;bottom:0;width:7px;cursor:ew-resize;z-index:2}
.bar .rl{left:0;border-radius:3px 0 0 3px}
.bar .rr{right:0;border-radius:0 3px 3px 0}
.divider{height:4px;background:#eee;border-top:1px solid #ddd;border-bottom:1px solid #ddd}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:8px;border:1px solid #ddd;padding:1.25rem;width:300px;max-width:90vw;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:.9rem}
.form-row{margin-bottom:.65rem}
.form-row label{display:block;font-size:11px;color:#666;margin-bottom:3px}
.form-row input,.form-row select{width:100%;padding:5px 7px;border:1px solid #ccc;border-radius:5px;font-size:12px}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:.9rem}
.btn-danger{background:#ffebee;color:#c62828;border-color:#ffcdd2}
.btn-danger:hover{background:#ffcdd2}
.loading{display:flex;align-items:center;justify-content:center;height:200px;font-size:14px;color:#999}
</style>
</head>
<body>
<div class="toolbar">
  <h2>📋 Schedule Board</h2>
  <span class="sync-status sync-saving" id="sync-status">Connecting...</span>
  <button class="btn" onclick="window.goBack()" title="Show previous month">◀ Back</button>
  <button class="btn" onclick="window.goForward()" id="fwd-btn" title="Go forward" style="display:none">Forward ▶</button>
  <button class="btn" onclick="monthOffset=0;render()" title="Jump to today">Today</button>
  <button class="btn" onclick="window.exportData()" title="Download a backup of all data">💾 Backup</button>
  <button class="btn" onclick="document.getElementById('import-file').click()" title="Restore from a backup file">📂 Restore</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="window.importData(event)">
  <button class="btn" onclick="document.getElementById('brighthr-file').click()" title="Import leave from Bright HR Excel export">📥 Import Bright HR</button>
  <input type="file" id="brighthr-file" accept=".xlsx,.xls" style="display:none" onchange="window.importBrightHR(event)">
  <button class="btn primary" onclick="openAddModal()">+ Add project / absence</button>
</div>
<div class="two-col">
  <div class="key-panel" id="key-panel"></div>
  <div class="gantt-wrap"><div class="gantt-inner" id="gantt"><div class="loading">Connecting to database...</div></div></div>
</div>

<div id="modal" style="display:none">
  <div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title">Add</h3>
      <div class="form-row"><label>Type</label>
        <select id="f-type" onchange="toggleModalType()">
          <option value="project">Project</option>
          <option value="absence">Absence</option>
        </select>
      </div>
      <div class="form-row" id="row-project-name"><label>Project name</label><input id="f-name" type="text" placeholder="e.g. Brookwood"></div>
      <div class="form-row" id="row-team"><label>Team</label><select id="f-row"></select></div>
      <div class="form-row" id="row-person" style="display:none"><label>Person</label><select id="f-person" onchange="updateAbsenceName()"></select></div>
      <div class="form-row"><label>Start date</label><input id="f-start" type="date" onchange="weeksToEnd()"></div>
      <div class="form-row" id="row-duration" style="display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:end">
        <div><label>End date</label><input id="f-end" type="date" onchange="document.getElementById('f-weeks').value=''"></div>
        <div style="text-align:center;padding-bottom:6px;color:#aaa;font-size:11px">or</div>
        <div><label>Weeks (Mon-Fri)</label><input id="f-weeks" type="number" min="1" max="104" placeholder="e.g. 6" oninput="weeksToEnd()"></div>
      </div>
      <div class="form-row" id="row-weekends" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="f-weekends" style="width:auto">
        <label for="f-weekends" style="font-size:12px;color:#555;cursor:pointer">Includes weekend overtime</label>
      </div>
      <div class="form-row" id="row-abs-row" style="display:none"><label>Absence row</label><select id="f-abs-row"></select></div>
      <div class="form-row"><label>Notes</label><textarea id="f-notes" rows="2" style="width:100%;padding:5px 7px;border:1px solid #ccc;border-radius:5px;font-size:12px;resize:vertical" placeholder="Any additional notes..."></textarea></div>
      <div class="modal-btns">
        <button class="btn btn-danger" id="del-btn" onclick="deleteEntry()" style="display:none">Delete</button>
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn primary" onclick="saveEntry()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">

import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh1xn4QdXO91wNmhXHbri7mj5D4qPTMJw",
  authDomain: "schedule-board2026.firebaseapp.com",
  databaseURL: "https://schedule-board2026-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "schedule-board2026",
  storageBucket: "schedule-board2026.firebasestorage.app",
  messagingSenderId: "733213254009",
  appId: "1:733213254009:web:73e320ac3c005b6ded8fa8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const XLSX = window.XLSX;

// ── Colour helpers ─────────────────────────────────────────────────────────
function lighten(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const mix=c=>Math.round(c+(255-c)*0.65);
  return '#'+[mix(r),mix(g),mix(b)].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function darkText(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const d=c=>Math.round(c*0.35);
  return '#'+[d(r),d(g),d(b)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ── Default data ───────────────────────────────────────────────────────────
const DEFAULT_TEAMS=[
  {name:'Red',    color:'#C62828',members:['Mat','Oli','Simon R']},
  {name:'Blue',   color:'#1565C0',members:['Dan','Tanton','Janice','Toma']},
  {name:'Green',  color:'#2E7D32',members:['Fred','Nick','Alison','Kai','Jack']},
  {name:'Yellow', color:'#F9A825',members:['Joinery 1','Joinery 2','Joinery 3']},
];
const DEFAULT_GROUPS=[
  {name:'Office',      color:'#37474F',members:['Simon','Mike','Cath','Gerard','Barry','Charlotte']},
  {name:'Maintenance', color:'#5D4037',members:['Ben','Jed','Kieran']},
];

// ── State ──────────────────────────────────────────────────────────────────
let TEAMS=[...DEFAULT_TEAMS];
let GROUPS=[...DEFAULT_GROUPS];
let entries={};
let editingId=null;
const ABS_ROWS=7;

const BH={
  // 2026 England
  '2026-01-01':"New Year's Day",
  '2026-04-03':'Good Friday',
  '2026-04-06':'Easter Monday',
  '2026-05-04':'Early May bank holiday',
  '2026-05-25':'Spring bank holiday',
  '2026-08-31':'Summer bank holiday',
  '2026-12-25':'Christmas Day',
  '2026-12-28':'Boxing Day (substitute)',
  // 2027 England
  '2027-01-01':"New Year's Day",
  '2027-03-26':'Good Friday',
  '2027-03-29':'Easter Monday',
  '2027-05-03':'Early May bank holiday',
  '2027-05-31':'Spring bank holiday',
  '2027-08-30':'Summer bank holiday',
  '2027-12-27':'Christmas Day (substitute)',
  '2027-12-28':'Boxing Day (substitute)',
  // 2028 England
  '2028-01-03':"New Year's Day (substitute)",
  '2028-04-14':'Good Friday',
  '2028-04-17':'Easter Monday',
  '2028-05-01':'Early May bank holiday',
  '2028-05-29':'Spring bank holiday',
  '2028-08-28':'Summer bank holiday',
  '2028-12-25':'Christmas Day',
  '2028-12-26':'Boxing Day',
};

const today=new Date();today.setHours(0,0,0,0);
const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const pd=s=>{const[y,m,day]=s.split('-').map(Number);return new Date(y,m-1,day);};
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const diff=(a,b)=>Math.round((b-a)/86400000);
const isBH=d=>BH[ds(d)]||null;

// ── Sync status ────────────────────────────────────────────────────────────
function setStatus(state){
  const el=document.getElementById('sync-status');
  if(state==='ok'){el.textContent='● Live';el.className='sync-status sync-ok';}
  else if(state==='saving'){el.textContent='● Saving...';el.className='sync-status sync-saving';}
  else{el.textContent='● Offline';el.className='sync-status sync-err';}
}

// ── Local cache (offline backup) ───────────────────────────────────────────
function saveToCache(){
  try{
    localStorage.setItem('sb_teams',JSON.stringify(TEAMS));
    localStorage.setItem('sb_groups',JSON.stringify(GROUPS));
    localStorage.setItem('sb_entries',JSON.stringify(entries));
    localStorage.setItem('sb_cached',new Date().toISOString());
  }catch(e){console.warn('Cache save failed',e);}
}
function loadFromCache(){
  try{
    const t=localStorage.getItem('sb_teams');
    const g=localStorage.getItem('sb_groups');
    const en=localStorage.getItem('sb_entries');
    const cached=localStorage.getItem('sb_cached');
    if(t)TEAMS=JSON.parse(t);
    if(g)GROUPS=JSON.parse(g);
    if(en)entries=JSON.parse(en);
    if(cached){
      const d=new Date(cached);
      setStatus('offline');
      document.getElementById('sync-status').textContent=`⚠ Offline — showing backup from ${d.toLocaleDateString('en-GB')} ${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
    }
    renderKey();render();
  }catch(e){console.warn('Cache load failed',e);}
}

// ── Firebase listeners ─────────────────────────────────────────────────────
onValue(ref(db,'teams'),snap=>{
  if(snap.exists()){
    const val=snap.val();
    TEAMS=Array.isArray(val)?val:Object.values(val);
    // Ensure each team's members is an array
    TEAMS=TEAMS.map(t=>({...t,members:Array.isArray(t.members)?t.members:Object.values(t.members||{})}));
  }
  else{ set(ref(db,'teams'),DEFAULT_TEAMS); }
  saveToCache();
  renderKey();render();
  setStatus('ok');
},err=>{
  setStatus('err');
  loadFromCache();
  console.error(err);
});

onValue(ref(db,'groups'),snap=>{
  if(snap.exists()){
    const val=snap.val();
    GROUPS=Array.isArray(val)?val:Object.values(val);
    GROUPS=GROUPS.map(g=>({...g,members:Array.isArray(g.members)?g.members:Object.values(g.members||{})}));
  }
  else{ set(ref(db,'groups'),DEFAULT_GROUPS); }
  saveToCache();
  renderKey();
},err=>console.error(err));

onValue(ref(db,'entries'),snap=>{
  entries=snap.exists()?snap.val():{};
  saveToCache();
  render();
},err=>console.error(err));

// ── Save helpers ───────────────────────────────────────────────────────────
function saveTeams(){setStatus('saving');set(ref(db,'teams'),TEAMS).then(()=>{setStatus('ok');saveToCache();});}
function saveGroups(){setStatus('saving');set(ref(db,'groups'),GROUPS).then(()=>{setStatus('ok');saveToCache();});}
function saveEntry(entryObj){
  setStatus('saving');
  if(entryObj.id){
    update(ref(db,`entries/${entryObj.id}`),entryObj).then(()=>{setStatus('ok');saveToCache();});
  } else {
    const newRef=push(ref(db,'entries'));
    entryObj.id=newRef.key;
    set(newRef,entryObj).then(()=>{setStatus('ok');saveToCache();});
  }
}
function removeEntry(id){
  setStatus('saving');
  remove(ref(db,`entries/${id}`)).then(()=>{setStatus('ok');saveToCache();});
}

// ── Export / Import ────────────────────────────────────────────────────────
window.exportData=()=>{
  const data={
    exported: new Date().toISOString(),
    teams: TEAMS,
    groups: GROUPS,
    entries: entries,
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download=`schedule-board-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

window.importData=(event)=>{
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.teams||!data.entries){alert('Invalid backup file.');return;}
      if(!confirm(`Restore backup from ${new Date(data.exported).toLocaleString('en-GB')}?\n\nThis will overwrite all current data.`))return;
      set(ref(db,'teams'),data.teams);
      set(ref(db,'groups'),data.groups||GROUPS);
      set(ref(db,'entries'),data.entries);
      alert('Backup restored successfully!');
    }catch(err){
      alert('Could not read backup file. Please check it is a valid Schedule Board backup.');
    }
  };
  reader.readAsText(file);
  event.target.value='';
};

// ── People helpers ─────────────────────────────────────────────────────────
function allGroups(){return[...TEAMS,...GROUPS];}
function getAllPeople(){return allGroups().flatMap(g=>g.members.map(m=>({name:m,group:g})));}
function personTeam(name){
  const p=getAllPeople().find(p=>p.name===name);
  if(!p)return{color:'#9E9E9E',bar:'#ccc',text:'#333'};
  return{color:p.group.color,bar:lighten(p.group.color),text:darkText(p.group.color)};
}

let monthOffset=0;
function getMonths(){
  const s=new Date(today.getFullYear(),today.getMonth()+monthOffset,1),m=[];
  for(let i=0;i<19;i++){const d=new Date(s.getFullYear(),s.getMonth()+i,1);m.push({year:d.getFullYear(),month:d.getMonth()});}
  return m;
}
function dim(y,m){return new Date(y,m+1,0).getDate();}
window.goBack=()=>{
  monthOffset--;
  document.getElementById('fwd-btn').style.display='inline-flex';
  render();
}
window.goForward=()=>{
  if(monthOffset<0){
    monthOffset++;
    if(monthOffset===0)document.getElementById('fwd-btn').style.display='none';
    render();
  }
}
// ── KEY PANEL ──────────────────────────────────────────────────────────────
function renderKey(){
  const panel=document.getElementById('key-panel');
  let html=`<div class="key-header">Team key</div>`;
  html+=`<div class="key-section-label" style="border-top:none">On the board</div>`;
  TEAMS.forEach((t,ti)=>{html+=teamBlock(t,ti,'team');});
  html+=`<div class="key-section-label">Key only</div>`;
  GROUPS.forEach((g,gi)=>{html+=teamBlock(g,gi,'group');});
  html+=`<div class="key-add-team">
    <div style="font-size:10px;color:#999;text-transform:uppercase;font-weight:600;margin-bottom:5px">Add new team</div>
    <div class="key-add-team-row">
      <input type="text" id="new-team-name" placeholder="Team name">
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin:5px 0">${PRESET_COLOURS.map(c=>`<div class="colour-swatch" style="background:${c}" onclick="document.getElementById('new-team-color').value='${c}';document.querySelectorAll('#new-team-swatches .colour-swatch').forEach(s=>s.classList.remove('selected'));this.classList.add('selected')"></div>`).join('')}</div>
    <input type="hidden" id="new-team-color" value="#7B1FA2">
    <div style="display:flex;gap:5px;margin-top:5px">
      <button class="btn sm" style="flex:1" onclick="window.addNewTeam(true)">+ Board row</button>

// ── Team edit functions (exposed globally) ─────────────────────────────────
let dragSrc=null;
window.dragTeamStart=(e,type,idx)=>{
  dragSrc={type,idx};
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.4';
};
window.dragTeamOver=(e)=>{
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.style.background='#e3f2fd';
};
window.dragTeamDrop=(e,type,idx)=>{
  e.preventDefault();
  e.currentTarget.style.background='';
  if(!dragSrc||dragSrc.type!==type||dragSrc.idx===idx)return;
  const arr=type==='team'?TEAMS:GROUPS;
  const moved=arr.splice(dragSrc.idx,1)[0];
  arr.splice(idx,0,moved);
  type==='team'?saveTeams():saveGroups();
  renderKey();render();
};
window.dragTeamEnd=(e)=>{
  e.currentTarget.style.opacity='1';
  e.currentTarget.style.background='';
};
window.moveTeam=(type,idx,dir)=>{
  const arr=type==='team'?TEAMS:GROUPS;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length)return;
  const tmp=arr[idx];arr[idx]=arr[newIdx];arr[newIdx]=tmp;
  type==='team'?saveTeams():saveGroups();
  renderKey();
  render();
};
window.toggleColourPicker=(type,idx)=>{
  const el=document.getElementById(`cp-${type}-${idx}`);
  if(el)el.classList.toggle('open');
};
window.changeTeamColor=(type,idx,color)=>{
  (type==='team'?TEAMS:GROUPS)[idx].color=color;
  const el=document.getElementById(`cp-${type}-${idx}`);
  if(el)el.classList.remove('open');
  type==='team'?saveTeams():saveGroups();
  renderKey();render();
};
window.renameTeam=(type,idx,val)=>{
  const arr=type==='team'?TEAMS:GROUPS;
  const old=arr[idx].name;
  arr[idx].name=val.trim()||old;
  if(type==='team'){
    Object.values(entries).forEach(e=>{if(e.rowId===old){e.rowId=arr[idx].name;saveEntry(e);}});
  }
  type==='team'?saveTeams():saveGroups();
  render();
};
window.deleteTeam=(type,idx)=>{
  const arr=type==='team'?TEAMS:GROUPS;
  if(!confirm(`Remove "${arr[idx].name}" team?`))return;
  if(type==='team'){
    const name=TEAMS[idx].name;
    Object.values(entries).forEach(e=>{if(e.rowId===name)removeEntry(e.id);});
    TEAMS.splice(idx,1);saveTeams();
  } else {
    GROUPS.splice(idx,1);saveGroups();
  }
  renderKey();render();
};
window.renameMember=(type,idx,mi,val)=>{
  (type==='team'?TEAMS:GROUPS)[idx].members[mi]=val.trim();
  type==='team'?saveTeams():saveGroups();
};
window.removeMember=(type,idx,mi)=>{
  (type==='team'?TEAMS:GROUPS)[idx].members.splice(mi,1);
  type==='team'?saveTeams():saveGroups();
  renderKey();
};
window.addMember=(type,idx)=>{
  const inp=document.getElementById(`add-${type}-${idx}`);
  const val=inp.value.trim();if(!val)return;
  (type==='team'?TEAMS:GROUPS)[idx].members.push(val);
  inp.value='';
  type==='team'?saveTeams():saveGroups();
  renderKey();
};
window.addNewTeam=(onBoard)=>{
  const name=document.getElementById('new-team-name').value.trim();
  const color=document.getElementById('new-team-color').value;
  if(!name){alert('Please enter a team name.');return;}

  renderKey();render();
};

// ── GANTT ──────────────────────────────────────────────────────────────────
function render(){
  const gantt=document.getElementById('gantt');
  gantt.innerHTML='';
  const months=getMonths();
  const LW=120;
  const availW=Math.max(document.getElementById('gantt').offsetWidth-LW-20, 31*28);
  const DW=Math.floor(availW/31);
  const entryList=Object.values(entries);

  months.forEach(({year,month})=>{
    const days=dim(year,month);
    const gc=`${LW}px repeat(${days},${DW}px)`;
    const sec=document.createElement('div');
    sec.className='month-section';
    const mname=new Date(year,month,1).toLocaleString('en-GB',{month:'long',year:'numeric'});

    let html=`<div class="month-header" style="grid-template-columns:${gc}"><div class="month-label">${mname}</div>`;
    for(let d=1;d<=days;d++){
      const dd=new Date(year,month,d);
      const dow=['Su','Mo','Tu','We','Th','Fr','Sa'][dd.getDay()];
      const we=dd.getDay()===0||dd.getDay()===6,tod=dd.getTime()===today.getTime(),bh=isBH(dd);
      html+=`<div class="day-cell${we?' we':''}${bh?' bh':''}${tod?' tod':''}" title="${bh||''}">${d}<br>${dow}</div>`;
    }
    html+='</div>';

    const ms=new Date(year,month,1),me=new Date(year,month,days);

    function makeBar(entry,bg,fc,bd){
      const ps=pd(entry.start),pe=pd(entry.end);
      if(pe<ms||ps>me)return'';
      const cs=ps<ms?ms:ps,ce=pe>me?me:pe;
      const isAbsence=entry.rowId&&entry.rowId.startsWith('absence');
      const skipWeekends=!entry.includesWeekends&&!isAbsence;

      if(!skipWeekends){
        // Original single bar
        const off=diff(ms,cs),span=diff(cs,ce)+1;
        const left=off*DW+1,width=span*DW-2;
        const showLbl=(ps>=ms&&ps<=me)||off===0;
        return`<div class="bar" title="${entry.notes||''}" style="left:${left}px;width:${width}px;background:${bg};color:${fc};border:1.5px solid ${bd};cursor:grab" onmousedown="window.startDrag(event,'${entry.id}')"><div class="rh rl" onmousedown="window.startResize(event,'${entry.id}','left')" onclick="event.stopPropagation()"></div>${showLbl?`<span style="pointer-events:none;padding:0 5px;overflow:hidden;text-overflow:ellipsis">${entry.name}${entry.notes?' 📝':''}</span>`:''}<div class="rh rr" onmousedown="window.startResize(event,'${entry.id}','right')" onclick="event.stopPropagation()"></div></div>`;
      }

      // Build segments — stop bar on Friday, restart on Monday
      let segments=[];
      let segStart=null;
      let d=new Date(cs);
      // If clamped start is a weekend, move to Monday
      while(d.getDay()===0||d.getDay()===6) d=addD(d,1);
      if(d>ce) return ''; // entire visible range is weekend
      while(d<=ce){
        const dow=d.getDay();
        const isWe=dow===0||dow===6;
        if(!isWe){
          if(!segStart)segStart=new Date(d);
          const next=addD(d,1);
          const nextIsWe=next.getDay()===0||next.getDay()===6;
          if(nextIsWe||d>=ce){
            segments.push({start:new Date(segStart),end:new Date(d)});
            segStart=null;
          }
        }
        d=addD(d,1);
      }

      return segments.map((seg,si)=>{
        const off=diff(ms,seg.start);
        const span=diff(seg.start,seg.end)+1;
        const left=off*DW+1,width=span*DW-2;
        if(left<0||width<=0)return'';
        const isFirst=si===0&&(ps>=ms&&ps<=me||off===0);
        const isLast=si===segments.length-1;
        return`<div class="bar" title="${entry.notes||''}" style="left:${left}px;width:${width}px;background:${bg};color:${fc};border:1.5px solid ${bd};cursor:grab;border-radius:${isFirst?'3px 0 0 3px':'0'} ${isLast?'3px 3px':'0 0'} ${isLast?'3px':'0'} ${isFirst?'3px':'0'}" onmousedown="window.startDrag(event,'${entry.id}')">
          <div class="rh rl" onmousedown="window.startResize(event,'${entry.id}','left')" onclick="event.stopPropagation()"></div>
          <span style="pointer-events:none;padding:0 5px;overflow:hidden;text-overflow:ellipsis">${entry.name}${entry.notes?' 📝':''}</span>
          <div class="rh rr" onmousedown="window.startResize(event,'${entry.id}','right')" onclick="event.stopPropagation()"></div>
        </div>`;
      }).join('');
    }

    function makeDayBgs(extraCls,h){
      let s='';
      for(let d=1;d<=days;d++){
        const dd=new Date(year,month,d);
        const we=dd.getDay()===0||dd.getDay()===6,tod=dd.getTime()===today.getTime(),bh=isBH(dd);
        s+=`<div class="day-bg${extraCls?' '+extraCls:''}${we?' we':''}${bh?' bh':''}${tod?' tod':''}" style="min-height:${h}px"></div>`;
      }
      return s;
    }

    TEAMS.forEach(team=>{
      const bar=lighten(team.color),fc=darkText(team.color);
      html+=`<div class="board-row" style="grid-template-columns:${gc}"><div class="row-label" style="background:${team.color};color:#fff;min-height:36px">${team.name}</div><div class="days-area" style="grid-column:2/${days+2};display:grid;grid-template-columns:repeat(${days},${DW}px);position:relative">${makeDayBgs('',36)}${entryList.filter(e=>e.rowId===team.name).map(e=>makeBar(e,bar,fc,team.color)).join('')}</div></div>`;
    });

    html+=`<div class="divider"></div>`;

    for(let ai=0;ai<ABS_ROWS;ai++){
      const rowId=`absence-${ai}`;
      html+=`<div class="board-row" data-absence-row="${ai}" style="grid-template-columns:${gc}"><div class="row-label abs-lbl" style="min-height:28px;padding-left:10px;border-left:3px solid #bbb">absence ${ai+1}</div><div class="days-area" style="grid-column:2/${days+2};display:grid;grid-template-columns:repeat(${days},${DW}px);position:relative">${makeDayBgs('abs-bg',28)}${entryList.filter(e=>e.rowId===rowId).map(e=>{
        const pt=personTeam(e.person||e.name);
        return makeBar(e,pt.bar,pt.text,pt.color);
      }).join('')}</div></div>`;
    }

    sec.innerHTML=html;
    gantt.appendChild(sec);
  });
}

function addWorkingDays(start, weeks){
  const includeWeekends=document.getElementById('f-weekends')?.checked||false;
  if(includeWeekends) return addD(start,(weeks*7)-1);
  let days=(weeks*5)-1; // -1 because start date counts as day 1
  let current=new Date(start);
  // If start is a weekend, move to Monday first
  while(current.getDay()===0||current.getDay()===6) current=addD(current,1);
  let counted=0;
  while(counted<days){
    current=addD(current,1);
    const dow=current.getDay();
    if(dow!==0&&dow!==6)counted++;
  }
  return current;
}
function weeksToEnd(){
  const weeks=parseInt(document.getElementById('f-weeks').value);
  const start=document.getElementById('f-start').value;
  if(weeks>0&&start){
    const end=addWorkingDays(pd(start),weeks);
    document.getElementById('f-end').value=ds(end);
  }
}

// ── Bright HR Import ───────────────────────────────────────────────────────
window.importBrightHR=(event)=>{
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array',cellDates:true});
      const sheet=workbook.Sheets[workbook.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(sheet,{defval:''});
      const allPeople=getAllPeople();
      const notFound=[],byPerson={};
      rows.forEach(row=>{
        const firstName=(row['First Name']||'').toString().trim();
        const lastName=(row['Last Name']||'').toString().trim();
        const fullName=`${firstName} ${lastName}`.trim();
        const status=(row['Absence Status']||'').toString().trim();
        const absType=(row['Absence Type']||'').toString().trim();
        if(status!=='Approved')return;
        if(absType==='Public holiday')return;
        const startRaw=row['Start Date'];
        const endRaw=row['End Date'];
        if(!startRaw||!endRaw)return;
        const startDate=startRaw instanceof Date?startRaw:new Date(startRaw);
        const endDate=endRaw instanceof Date?endRaw:new Date(endRaw);
        if(isNaN(startDate)||isNaN(endDate))return;
        const startStr=ds(startDate);
        const endStr=ds(endDate);
        const person=allPeople.find(p=>p.name.toLowerCase()===fullName.toLowerCase());
        if(!person){if(fullName&&!notFound.includes(fullName))notFound.push(fullName);return;}
        if(!byPerson[person.name])byPerson[person.name]=[];
        byPerson[person.name].push({fullName:person.name,firstName,startStr,endStr});
      });
      const allEntries=Object.values(byPerson).flat();
      if(allEntries.length===0){
        alert(`No approved leave found.\n\nNames not matched:\n${notFound.join(', ')||'None'}`);
        event.target.value='';return;
      }
      // Clear all existing absence rows before importing
      Object.values(entries).forEach(e=>{
        if(e.rowId&&e.rowId.startsWith('absence-'))removeEntry(e.id);
      });
      let rowIdx=0;
      allEntries.forEach(item=>{
        saveEntry({id:null,name:item.firstName,rowId:`absence-${rowIdx%ABS_ROWS}`,start:item.startStr,end:item.endStr,person:item.fullName,notes:'',includesWeekends:false,pendingLeave:false});
        rowIdx++;
      });
      let msg=`Imported ${allEntries.length} leave entries across ${Object.keys(byPerson).length} staff.`;
      if(notFound.length>0)msg+=`\n\nNot matched — update names in board key to match Bright HR:\n${notFound.join(', ')}`;
      alert(msg);
    }catch(err){
      console.error(err);
      alert('Could not read the file. Please use the Bright HR Excel export (.xlsx).');
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value='';
};


window.startResize=(e,id,side)=>{
  e.preventDefault();
  e.stopPropagation();
  const entry=entries[id];if(!entry)return;
  const DW=26,startX=e.clientX,origS=entry.start,origE=entry.end;
  function onMove(ev){
    const dd=Math.round((ev.clientX-startX)/DW);
    if(side==='right'){const ne=addD(pd(origE),dd);if(ne>=pd(origS))entry.end=ds(ne);}
    else{const ns=addD(pd(origS),dd);if(ns<=pd(origE))entry.start=ds(ns);}
    render();
  }
  function onUp(){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    saveEntry(entry);
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
};

window.startDrag=(e,id)=>{
  if(e.target.classList.contains('rh'))return;
  e.preventDefault();
  const entry=entries[id];if(!entry)return;

  const barEl=e.currentTarget;
  const barRect=barEl.getBoundingClientRect();
  const duration=diff(pd(entry.start),pd(entry.end));
  const startX=e.clientX;
  const startY=e.clientY;
  let moved=false;
  let ghost=null;
  let lastDd=0;

  const gantt=document.getElementById('gantt');
  const LW=120;
  const availW=Math.max(gantt.offsetWidth-LW-20,31*28);
  const DW=Math.floor(availW/31);
  const origS=entry.start,origE=entry.end;
  const offsetX=e.clientX-barRect.left;
  const offsetY=e.clientY-barRect.top;

  function createGhost(){
    ghost=document.createElement('div');
    ghost.style.cssText=`position:fixed;width:${barRect.width}px;height:${barRect.height}px;background:${barEl.style.background};border:${barEl.style.border};color:${barEl.style.color};border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;pointer-events:none;z-index:9999;opacity:0.85;box-shadow:0 8px 24px rgba(0,0,0,.25);transform:scale(1.03);white-space:nowrap;overflow:hidden;padding:0 8px;cursor:grabbing;`;
    ghost.textContent=entry.name;
    document.body.appendChild(ghost);
    barEl.style.opacity='0.25';
  }

  function positionGhost(ev){
    if(ghost){ghost.style.left=(ev.clientX-offsetX)+'px';ghost.style.top=(ev.clientY-offsetY)+'px';}
  }

  function onMove(ev){
    const dx=Math.abs(ev.clientX-startX),dy=Math.abs(ev.clientY-startY);
    if(!moved&&dx<5&&dy<5)return; // threshold before drag starts
    if(!moved){moved=true;createGhost();}
    positionGhost(ev);
    const dd=Math.round((ev.clientX-startX)/DW);
    if(dd===lastDd)return;
    lastDd=dd;
    const ns=addD(pd(origS),dd);
    const ne=addD(ns,duration);
    entry.start=ds(ns);
    entry.end=ds(ne);
    render();
    const newBar=document.querySelector(`.bar[onmousedown*="${entry.id}"]`);
    if(newBar)newBar.style.opacity='0.25';
  }

  function onUp(ev){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    if(ghost)ghost.remove();

    if(!moved){
      // It was a click — open modal
      barEl.style.opacity='1';
      window.openEditModal(id);
      return;
    }

    // Check if dropped onto a different absence row
    if(entry.rowId&&entry.rowId.startsWith('absence-')){
      const el=document.elementFromPoint(ev.clientX,ev.clientY);
      if(el){
        let target=el;
        while(target&&target!==document.body){
          if(target.dataset&&target.dataset.absenceRow!==undefined){
            const newRowId=`absence-${target.dataset.absenceRow}`;
            if(newRowId!==entry.rowId)entry.rowId=newRowId;
            break;
          }
          target=target.parentElement;
        }
      }
    }

    const newBar=document.querySelector(`.bar[onmousedown*="${entry.id}"]`);
    if(newBar)newBar.style.opacity='1';
    saveEntry(entry);
    render();
  }

  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
};

// expose modal toggle
window.toggleModalType=toggleModalType;
window.updateAbsenceName=updateAbsenceName;
window.weeksToEnd=weeksToEnd;
window.addEventListener('resize', render);
renderKey();
</script>
</body>
